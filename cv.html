<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV · Hugo Davion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --text: #3d4f7a;
      --muted: #6a7da8;
      --accent: #5a7fd4;
      --border: #c8d8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--text);
      line-height: 1.55;
      background: #eef4fc;
      padding: 2rem 1rem;
    }
    .cv {
      max-width: 820px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2.75rem;
      box-shadow: 0 12px 40px rgba(100, 140, 210, 0.12);
    }
    .cv__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .cv__btn {
      display: inline-block;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .cv__btn--primary { background: var(--accent); color: #fff; }
    .cv__btn--outline {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .cv__head {
      display: flex;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
      border-bottom: 2px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 1.75rem;
    }
    h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
    .cv__role { color: var(--accent); font-weight: 700; font-size: 1.1rem; margin-top: 0.25rem; }
    .cv__details { color: var(--muted); font-size: 0.9rem; margin-top: 0.35rem; }
    .cv__contact {
      font-size: 0.92rem;
      text-align: right;
      color: var(--muted);
    }
    .cv__contact a { color: var(--accent); text-decoration: none; }
    h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin: 1.5rem 0 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
    }
    p, li { font-size: 0.95rem; color: var(--muted); }
    ul { padding-left: 1.2rem; }
    li { margin-bottom: 0.35rem; }
    .cv__entry { margin-bottom: 1.1rem; }
    .cv__entry-head {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.2rem;
    }
    .cv__entry-head strong { color: var(--text); }
    .cv__entry-head span { font-size: 0.85rem; }
    .cv__entry-role { font-weight: 600; color: var(--text); font-size: 0.92rem; margin-bottom: 0.35rem; }
    .cv__project { margin-bottom: 1rem; }
    .cv__project strong { color: var(--text); display: block; margin-bottom: 0.15rem; }
    .cv__project span { font-size: 0.88rem; }
    @media print {
      body { background: #fff; padding: 0; }
      .cv { box-shadow: none; border: none; border-radius: 0; max-width: none; }
      .cv__actions, .cv__back { display: none !important; }
    }
    .cv__back {
      display: block;
      text-align: center;
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <article class="cv" id="cv-root"></article>
  <a class="cv__back" href="./">← Retour au portfolio</a>
  <script type="module">
    import {
      profile,
      about,
      projects,
      experience,
      education,
      softSkills,
      languages,
      stackGroups,
      site,
      metaProjectIds,
    } from './config.js';

    const live = projects.filter((p) => p.url && !p.local && !metaProjectIds.has(p.id));
    const featured = projects.filter((p) => p.featured);
    const skills = [...new Set(stackGroups.flatMap((g) => g.items))];

    const pdfHref = profile.cv || '';
    const actions = pdfHref
      ? `<div class="cv__actions">
          <a class="cv__btn cv__btn--primary" href="${pdfHref}" download>Télécharger le PDF</a>
          <button type="button" class="cv__btn cv__btn--outline" onclick="window.print()">Imprimer cette page</button>
        </div>`
      : `<div class="cv__actions">
          <button type="button" class="cv__btn cv__btn--primary" onclick="window.print()">Enregistrer en PDF</button>
        </div>`;

    document.getElementById('cv-root').innerHTML = `
      ${actions}
      <header class="cv__head">
        <div>
          <h1>${profile.name}</h1>
          <p class="cv__role">${profile.role}</p>
          ${profile.details ? `<p class="cv__details">${profile.location} · ${profile.details}</p>` : ''}
        </div>
        <div class="cv__contact">
          <div><a href="mailto:${profile.email}">${profile.email}</a></div>
          <div>${profile.phone}</div>
          ${profile.linkedin ? `<div><a href="${profile.linkedin}">LinkedIn</a></div>` : ''}
          <div><a href="${profile.github}">github.com/${profile.githubUser}</a></div>
          ${site.canonicalUrl ? `<div><a href="${site.canonicalUrl}">Portfolio</a></div>` : ''}
        </div>
      </header>

      <section>
        <h2>Profil</h2>
        <p>${profile.bio}</p>
      </section>

      <section>
        <h2>Compétences techniques</h2>
        <ul>${skills.map((s) => `<li>${s}</li>`).join('')}</ul>
      </section>

      <section>
        <h2>Soft skills</h2>
        <ul>${softSkills.map((s) => `<li>${s}</li>`).join('')}</ul>
      </section>

      <section>
        <h2>Langues</h2>
        <ul>${languages.map((l) => `<li><strong>${l.name}</strong> — ${l.level}</li>`).join('')}</ul>
      </section>

      <section>
        <h2>Expériences professionnelles</h2>
        ${experience
          .map(
            (job) => `
          <div class="cv__entry">
            <div class="cv__entry-head">
              <strong>${job.company}</strong>
              <span>${job.period}</span>
            </div>
            <p class="cv__entry-role">${job.role}</p>
            <ul>${job.highlights.map((h) => `<li>${h}</li>`).join('')}</ul>
          </div>`,
          )
          .join('')}
      </section>

      <section>
        <h2>Formation</h2>
        ${education
          .map(
            (edu) => `
          <div class="cv__entry">
            <div class="cv__entry-head">
              <strong>${edu.title}</strong>
              <span>${edu.period}</span>
            </div>
            <p class="cv__entry-role">${edu.school} — ${edu.subtitle}</p>
            <ul>${edu.highlights.map((h) => `<li>${h}</li>`).join('')}</ul>
          </div>`,
          )
          .join('')}
      </section>

      <section>
        <h2>Projets mis en avant</h2>
        ${featured
          .map(
            (p) => `
          <div class="cv__project">
            <strong>${p.name}</strong>
            <span>${p.description}</span>
            ${p.url && !p.local ? `<br><span>${p.url}</span>` : ''}
          </div>`,
          )
          .join('')}
      </section>

      <section>
        <h2>Réalisations en ligne</h2>
        <ul>
          ${live.map((p) => `<li><strong style="color:var(--text)">${p.name}</strong> — ${p.url}</li>`).join('')}
        </ul>
      </section>
    `;

    document.title = `CV · ${profile.name}`;
  </script>
</body>
</html>
